<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paseo Feliz - Servicios</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/png">

    <link rel="stylesheet" href="../css/principal_css/global.css">
    <link rel="stylesheet" href="../css/principal_css/paseos.css">
    <link rel="stylesheet" href="../css/principal_css/chat.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
            /* ── RESET & BASE ─────────────────────────────────────────── */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #F5F7FA;
        color: #333;
    }

    /* ── LAYOUT PRINCIPAL ────────────────────────────────────── */
    .app-container {
        display: flex;
        min-height: 100vh;
    }

    /* ── ÁREA PRINCIPAL DEL CHAT ─────────────────────────────── */
    .chat-main {
        flex: 1;
        display: flex;
        overflow: hidden;
    }

    /* ── PANEL IZQUIERDO: lista de conversaciones ─────────────── */
    .conversations-panel {
        width: 280px;
        background: #fff;
        border-right: 1px solid #E0E0E0;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
    }

    .conversations-header {
        padding: 20px 18px 14px;
        border-bottom: 1px solid #E0E0E0;
    }

    .conversations-header h2 {
        font-size: 1.05rem;
        font-weight: 600;
        color: #333;
    }

    .search-conv {
        margin: 12px 14px 0;
        position: relative;
    }

    .search-conv input {
        width: 100%;
        padding: 8px 12px 8px 34px;
        border: 1px solid #E0E0E0;
        border-radius: 20px;
        font-size: 0.82rem;
        background: #F5F7FA;
        outline: none;
        color: #333;
        transition: border 0.2s;
    }

    .search-conv input:focus {
        border-color: #3E72A6;
    }

    .search-conv i {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
        font-size: 0.85rem;
    }

    .conv-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
    }

    .conv-list::-webkit-scrollbar {
        width: 4px;
    }

    .conv-list::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 2px;
    }

    .conv-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        cursor: pointer;
        transition: background 0.15s;
        position: relative;
    }

    .conv-item:hover {
        background: #F5F7FA;
    }

    .conv-item.active {
        background: #EBF3FB;
    }

    .conv-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #3E72A6;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        flex-shrink: 0;
        position: relative;
    }

    .conv-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    .online-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #25D366;
        border: 2px solid white;
        position: absolute;
        bottom: 1px;
        right: 1px;
    }

    .conv-info {
        flex: 1;
        min-width: 0;
    }

    .conv-name {
        font-size: 0.88rem;
        font-weight: 600;
        color: #222;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .conv-last {
        font-size: 0.76rem;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }

    .conv-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
    }

    .conv-time {
        font-size: 0.7rem;
        color: #aaa;
    }

    .conv-badge {
        background: #25D366;
        color: white;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        font-weight: 700;
    }

    /* ── PANEL DERECHO: ventana de chat ──────────────────────── */
    .chat-window {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #F5F7FA;
        min-width: 0;
    }

    /* Header del chat */
    .chat-header {
        background: #fff;
        border-bottom: 1px solid #E0E0E0;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .chat-header-back {
        color: #3E72A6;
        font-size: 1.1rem;
        cursor: pointer;
        background: none;
        border: none;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.88rem;
        font-weight: 500;
    }

    .chat-header-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #3E72A6;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 0.85rem;
        position: relative;
    }

    .chat-header-info {
        flex: 1;
    }

    .chat-header-name {
        font-weight: 600;
        font-size: 0.95rem;
        color: #222;
    }

    .chat-header-status {
        font-size: 0.75rem;
        color: #25D366;
    }

    .chat-header-actions {
        display: flex;
        gap: 10px;
    }

    .action-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #666;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
    }

    .action-btn:hover {
        background: #F0F0F0;
        color: #333;
    }

    /* Área de mensajes */
    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .messages-area::-webkit-scrollbar {
        width: 5px;
    }

    .messages-area::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 3px;
    }

    /* Separador de fecha */
    .date-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 8px 0;
    }

    .date-divider span {
        font-size: 0.72rem;
        color: #aaa;
        background: #F5F7FA;
        padding: 0 8px;
        white-space: nowrap;
    }

    .date-divider::before,
    .date-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #E0E0E0;
    }

    /* Burbujas de mensaje */
    .msg-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
    }

    .msg-row.sent {
        flex-direction: row-reverse;
    }

    .msg-avatar-sm {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #3E72A6;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.7rem;
        font-weight: 600;
        flex-shrink: 0;
    }

    .msg-bubble {
        max-width: 62%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 0.875rem;
        line-height: 1.5;
        position: relative;
    }

    /* Recibido */
    .msg-row.received .msg-bubble {
        background: #fff;
        color: #333;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    /* Enviado */
    .msg-row.sent .msg-bubble {
        background: #3E72A6;
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .msg-time {
        font-size: 0.65rem;
        margin-top: 4px;
        opacity: 0.6;
        text-align: right;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 3px;
    }

    .msg-row.received .msg-time {
        color: #888;
    }

    .msg-row.sent .msg-time {
        color: rgba(255, 255, 255, 0.7);
    }

    /* Imagen adjunta en el mensaje */
    .msg-image {
        width: 200px;
        height: 150px;
        border-radius: 12px;
        object-fit: cover;
        display: block;
        margin-bottom: 6px;
        cursor: pointer;
    }

    .msg-image-caption {
        font-size: 0.78rem;
        opacity: 0.75;
    }

    /* ── INPUT AREA ──────────────────────────────────────────── */
    .input-area {
        background: #fff;
        border-top: 1px solid #E0E0E0;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .input-icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #888;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s, background 0.15s;
        flex-shrink: 0;
    }

    .input-icon-btn:hover {
        color: #3E72A6;
        background: #EBF3FB;
    }

    .input-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        background: #F5F7FA;
        border-radius: 24px;
        border: 1px solid #E0E0E0;
        padding: 6px 14px;
        transition: border 0.2s;
    }

    .input-wrapper:focus-within {
        border-color: #3E72A6;
        background: #fff;
    }

    #msg-input {
        flex: 1;
        border: none;
        background: transparent;
        outline: none;
        font-size: 0.875rem;
        color: #333;
        resize: none;
        min-height: 22px;
        max-height: 100px;
        font-family: inherit;
        line-height: 1.4;
    }

    #msg-input::placeholder {
        color: #bbb;
    }

    .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: #3E72A6;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.1s;
        flex-shrink: 0;
    }

    .send-btn:hover {
        background: #2d5d8a;
    }

    .send-btn:active {
        transform: scale(0.93);
    }

    .send-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
    }

    /* Indicador "escribiendo..." */
    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: #fff;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        width: fit-content;
    }

    .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #aaa;
        animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {

        0%,
        60%,
        100% {
            transform: translateY(0);
        }

        30% {
            transform: translateY(-6px);
        }
    }

    /* Estado vacío (sin conversación seleccionada) */
    .empty-chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #bbb;
        gap: 14px;
    }

    .empty-chat i {
        font-size: 3rem;
        color: #ddd;
    }

    .empty-chat p {
        font-size: 0.9rem;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 680px) {
        .conversations-panel {
            width: 100%;
        }

        .chat-window {
            display: none;
        }

        .chat-window.active {
            display: flex;
        }

        .conversations-panel.hidden {
            display: none;
        }
    }
    </style>
</head>

        // ── DATOS DE CONVERSACIONES (simulados) ─────────────────────────────────────
const conversaciones = [
    {
        id: 1,

        iniciales: "YA",
        online: true,

            { de: "ellos", texto: "Claro está bien dime el horario que desea", hora: "09:44", leido: true },

    },

        online: true,

        ultimo: "El paseo terminó exitosamente ✅",
        badge: 0,
        mensajes: [
            { de: "ellos", texto: "¡Buenos días! Salí con Max a las 7am", hora: "07:02", leido: true },
            { de: "ellos", texto: "El paseo terminó exitosamente ✅", hora: "07:58", leido: true },
            { de: "yo", texto: "¡Perfecto! Muchas gracias Enrique 🙏", hora: "08:10", leido: true },
        ]
    },
    {
        id: 3,
        nombre: "Paseador Juan",
        rol: "Paseador",
        iniciales: "PJ",
        online: false,
        tiempo: "3 días",
        ultimo: "Confirmo reserva para el lunes",
        badge: 0,
        mensajes: [
            { de: "yo", texto: "Hola Juan, ¿puedes el lunes?", hora: "Lun 10:00", leido: true },
            { de: "ellos", texto: "Confirmo reserva para el lunes", hora: "Lun 10:15", leido: true },
        ]
    }
];

let convActiva = null;
let escribiendo = false;

// ── RENDER: lista de conversaciones ──────────────────────────────────────────
function renderConvList(filtro = '') {
    const lista = document.getElementById('conv-list');
    lista.innerHTML = '';

    const filtradas = conversaciones.filter(c =>
        c.nombre.toLowerCase().includes(filtro.toLowerCase())
    );

    filtradas.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conv-item' + (convActiva && convActiva.id === conv.id ? ' active' : '');
        item.dataset.id = conv.id;

        item.innerHTML = `
      <div class="conv-avatar">
        <span>${conv.iniciales}</span>
        ${conv.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name">${conv.nombre}</div>
        <div class="conv-last">${conv.ultimo}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${conv.tiempo}</span>
        ${conv.badge > 0 ? `<div class="conv-badge">${conv.badge}</div>` : ''}
      </div>
    `;

        item.addEventListener('click', () => abrirConversacion(conv.id));
        lista.appendChild(item);
    });
}

// ── RENDER: mensajes de la conversación activa ────────────────────────────────
function renderMensajes(conv) {
    const area = document.getElementById('messages-area');
    area.innerHTML = '';

    // Separador de fecha
    const divider = document.createElement('div');
    divider.className = 'date-divider';
    divider.innerHTML = '<span>Hoy</span>';
    area.appendChild(divider);

    conv.mensajes.forEach(msg => {
        const row = document.createElement('div');
        row.className = `msg-row ${msg.de === 'yo' ? 'sent' : 'received'}`;

        let contenidoMsg = '';

        if (msg.imagen) {
            contenidoMsg += `<img src="${msg.imagen}" class="msg-image" alt="imagen adjunta" />`;
            if (msg.imgCaption) contenidoMsg += `<div class="msg-image-caption">${msg.imgCaption}</div>`;
        }
        contenidoMsg += msg.texto;

        const checkIcon = msg.de === 'yo'
            ? `<i class="fas fa-check-double" style="font-size:0.65rem;"></i>`
            : '';

        if (msg.de === 'ellos') {
            row.innerHTML = `
                        <div class="msg-avatar-sm">${conv.iniciales}</div>
                        <div>
                            <div class="msg-bubble">${contenidoMsg}</div>
                            <div class="msg-time">${msg.hora}</div>
                            </div>
                            `;
        } else {
            row.innerHTML = `
                        <div>
                            <div class="msg-bubble">${contenidoMsg}</div>
                            <div class="msg-time">${checkIcon} ${msg.hora}</div>
                            </div>
                            `;
        }

        area.appendChild(row);
    });

    // Scroll al fondo
    area.scrollTop = area.scrollHeight;
}

// ── ABRIR CONVERSACIÓN ────────────────────────────────────────────────────────
function abrirConversacion(id) {
    convActiva = conversaciones.find(c => c.id === id);
    if (!convActiva) return;

    // Quitar badge
    convActiva.badge = 0;

    // Actualizar header
    const header = document.getElementById('chat-header');
    const headerAvt = document.getElementById('header-avatar');
    const headerNom = document.getElementById('header-name');
    const headerSts = document.getElementById('header-status');
    const emptyState = document.getElementById('empty-state');
    const msgArea = document.getElementById('messages-area');
    const inputArea = document.getElementById('input-area');

    headerAvt.textContent = convActiva.iniciales;
    headerNom.textContent = convActiva.nombre;
    headerSts.textContent = convActiva.online ? 'En línea' : 'Desconectado';
    headerSts.style.color = convActiva.online ? '#25D366' : '#aaa';

    emptyState.style.display = 'none';
    header.style.display = 'flex';
    msgArea.style.display = 'flex';
    inputArea.style.display = 'flex';

    renderMensajes(convActiva);
    renderConvList(document.getElementById('search-input').value);

    // Responsive: en móvil ocultar panel
    if (window.innerWidth <= 680) {
        document.getElementById('conv-panel').classList.add('hidden');
        document.getElementById('btn-back').style.display = 'flex';
    }
}

// ── ENVIAR MENSAJE ────────────────────────────────────────────────────────────
function enviarMensaje() {
    const input = document.getElementById('msg-input');
    const texto = input.value.trim();
    if (!texto || !convActiva) return;

    const ahora = new Date();
    const hora = ahora.getHours().toString().padStart(2, '0') + ':' +
        ahora.getMinutes().toString().padStart(2, '0');

    convActiva.mensajes.push({ de: 'yo', texto, hora, leido: false });
    convActiva.ultimo = texto;
    convActiva.tiempo = 'Ahora';

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btn-send').disabled = true;

    renderMensajes(convActiva);
    renderConvList();

    // Simular respuesta del otro usuario
    simularRespuesta();
}

function simularRespuesta() {
    const area = document.getElementById('messages-area');

    // Mostrar "escribiendo..."
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row received';
    typingRow.id = 'typing-row';
    typingRow.innerHTML = `
                <div class="msg-avatar-sm">${convActiva.iniciales}</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    </div>
                    `;
    area.appendChild(typingRow);
    area.scrollTop = area.scrollHeight;

    const respuestas = [
        "Entendido, con gusto te ayudo con eso 😊",
        "Claro, déjame revisar y te confirmo.",
        "Perfecto, tomaré nota de eso.",
        "¡Listo! Queda agendado para la fecha indicada.",
        "¿Hay algo más en lo que pueda ayudarte?"
    ];

    setTimeout(() => {
        const rowEl = document.getElementById('typing-row');
        if (rowEl) rowEl.remove();

        const respuesta = respuestas[Math.floor(Math.random() * respuestas.length)];
        const ahora = new Date();
        const hora = ahora.getHours().toString().padStart(2, '0') + ':' +
            ahora.getMinutes().toString().padStart(2, '0');

        convActiva.mensajes.push({ de: 'ellos', texto: respuesta, hora, leido: true });
        convActiva.ultimo = respuesta;
        renderMensajes(convActiva);
        renderConvList();
    }, 1800);
}

// ── EVENTOS ───────────────────────────────────────────────────────────────────

// Textarea: auto-resize y activar botón enviar
document.getElementById('msg-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    document.getElementById('btn-send').disabled = this.value.trim() === '';
});

// Enter para enviar (Shift+Enter = nueva línea)
document.getElementById('msg-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarMensaje();
    }
});

document.getElementById('btn-send').addEventListener('click', enviarMensaje);

// Búsqueda de conversaciones
document.getElementById('search-input').addEventListener('input', function () {
    renderConvList(this.value);
});

// Botón volver en móvil
document.getElementById('btn-back').addEventListener('click', () => {
    document.getElementById('conv-panel').classList.remove('hidden');
    document.getElementById('btn-back').style.display = 'none';
    document.getElementById('chat-header').style.display = 'none';
    document.getElementById('messages-area').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    convActiva = null;
});

// Menú hamburguesa
document.getElementById('btn-menu').addEventListener('click', () => {
    document.getElementById('menu-latente').classList.toggle('show');
});
window.addEventListener('click', e => {
    const btn = document.getElementById('btn-menu');
    const menu = document.getElementById('menu-latente');
    if (!btn.contains(e.target) && !menu.contains(e.target))
        menu.classList.remove('show');
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderConvList();

// Abrir la primera conversación por defecto en desktop
if (window.innerWidth > 680) {
    abrirConversacion(1);
}
    </script>
