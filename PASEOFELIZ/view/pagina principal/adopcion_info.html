<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información de Adopción - Paseo Feliz</title>
    <link rel="stylesheet" href="../css/movil_style_css.css">
    <link rel="stylesheet" href="../css/principal_css/adopcion.css">
    <link rel="stylesheet" href="../css/principal_css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="app-container">

        <nav class="sidebar">
            <div class="menu-hamburguesa-container">
                <div class="profile-circle" id="btn-menu">
                    <i class="fas fa-bars"></i>
                </div>

                <nav class="menu-desplegable" id="menu-latente">
                    <ul>
                        <li><i class="fas fa-camera"></i> <span>Conocenos</span></li>
                        <li><i class="fas fa-book-open"></i> <span>Direccion oficial</span></li>
                        <li><i class="fas fa-sliders-h"></i> <span>Centro de Ayuda</span></li>
                        <li><i class="fas fa-gear"></i> <span>Configuracion</span></li>
                        <li><i class="fas fa-user-minus"></i> <span>Cerrar sesion</span></li>
                    </ul>
                </nav>
            </div>
            <ul class="nav-links">
                <li><a href="inicio.html"><i class="fas fa-paw"></i><span>Servicios</span></a></li>
                <li><a href="chat.html"><i class="far fa-comment-alt"></i><span>Chat</span></a></li>
                <li><a href="mapa.html"><i class="fas fa-map-marker-alt"></i><span>Mapa</span></a></li>
                <li class="active"><a href="adopcion.html"><i class="fas fa-bone"></i><span>Adopción</span></a></li>
                <li><a href="usuario.html"><i class="fas fa-user"></i><span>Usuario</span></a></li>
            </ul>
        </nav>

        <main class="info-container" style="background-color: white; padding: 20px;">

            <header style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <a href="adopcion.html" style="color: #333; font-size: 1.2rem; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h2 style="font-weight: 500;">¡Adóptame!</h2>
            </header>

            <section style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div id="contenedorMinis" style="display: flex; flex-direction: column; gap: 10px;">
                    <img class="mini-foto" src="" alt="Mini 1" style="width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background-color: #f5f5f5;">
                    <img class="mini-foto" src="" alt="Mini 2" style="width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background-color: #f5f5f5;">
                    <img class="mini-foto" src="" alt="Mini 3" style="width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background-color: #f5f5f5;">
                </div>

                <div style="flex: 1; max-width: 400px;">
                    <img id="petImage" src="" alt="Mascota"
                        style="width: 100%; border-radius: 20px; object-fit: cover; min-height: 350px; background-color: #f0f0f0;">
                </div>

                <div style="flex: 1;">
                    <h1 id="petName" style="font-size: 2.5rem; margin-bottom: 5px;">Cargando...</h1>
                    <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">Publicado: mayo 08, 2026</p>

                    <div class="stats-grid" style="font-size: 0.95rem; line-height: 1.6; color: #444; margin-bottom: 20px;">
                        <p><strong>Edad:</strong> <span id="petAge">--</span></p>
                        <p><strong>Tamaño:</strong> <span id="petSize">--</span></p>
                        <p><strong>Raza:</strong> <span id="petBreed">--</span></p>
                        <p><strong>Color:</strong> <span id="petColor">--</span></p>
                    </div>

                    <p id="petDescription" style="margin-bottom: 15px; color: #555;">--</p>

                    <button style="padding: 8px 20px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: 600;">Adoptar</button>
                </div>
            </section>

            <section style="border-top: 1px solid #eee; padding-top: 20px;">
                <h3 id="reqTitle" style="margin-bottom: 15px; color: #333; display: flex; align-items: center; gap: 8px;">
                    Requisitos para adoptar a <span id="reqName">...</span> →
                </h3>

                <div id="reqContent" style="font-size: 0.85rem; color: #666; line-height: 1.5;">
                </div>

                <button class="btn-solicitud" onclick="procesarSolicitud()"
                    style="margin-top: 30px; background-color: #1a3c5a; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold;">
                    Empezar con la solicitud de adopcion
                </button>
            </section>

        </main>
    </div>

    <script>
        const catalogoPerros = {
            "1": {
                nombre: "Romeo y July",
                imgPrincipal: "RomeoYJuli.png",
                minis: ["mini1-1.jpg", "mini2.jpg", "mini3.jpg"],
                edad: "4 y 3 años",
                tamano: "Grandes",
                raza: "Lobo Siberiano",
                color: "Negro/Blanco(Romeo) Y Marron/Blanco(Juli)",
                desc: "Es encantadora, juguetona y se la lleva muy bien con todos. Es un amor. Ya está esterilizada.",
                requisitos: `
                    <p>Entender que un animal no es un objeto más de la casa, es un ser vivo con la capacidad de sentir...</p>
                    <p>Debes ser mayor de edad. Presentar el DNI de identificación.</p>
                    <p>Comprobante de domicilio e ingresos del hogar.</p>
                    <p>Debes firmar un acta que te compromete a: Cuidar de tu animal y mantenerlo en condiciones óptimas de espacio, tiempo, alimentación, actividad física y ejercicio.</p>
                    <p>Dotarle de los cuidados veterinarios que necesite.</p>
                    <p>No destinarlo a la cría, reproducción o entretenimiento.</p>
                    <p>Compromiso de no abandono ni maltrato a riesgo de consecuencias legales.</p>
                    <p>Notificar cualquier cambio a la fundación.</p>
                    <p>Cubrir los costes de adopción (Donación para cubrir parte de los gastos del rescate y rehabilitación).</p>
                `
            },
            "2": {
                nombre: "Toby",
                imgPrincipal: "Toby.png",
                minis: ["mini1.jpg", "mini2.jpg", "mini3.jpg"],
                edad: "2 años",
                tamano: "Mediano",
                raza: "Criollo",
                color: "Marrón",
                desc: "Toby es un perro muy enérgico que necesita un hogar con patio.",
                requisitos: `
                    <p>Compromiso para realizar al menos 2 paseos largos diarios debido a su alto nivel de energía.</p>
                    <p>Hogar con espacio exterior seguro (patio o jardín vallado).</p>
                    <p>Asistir a clases básicas de obediencia canina.</p>
                    <p>Tiempo disponible para juego y estimulación mental.</p>
                    <p>Presentar DNI y comprobante de ingresos.</p>
                `

            },
            "3": {
                nombre: "Luna",
                imgPrincipal: "Luna.png",
                minis: ["mini1.jpg", "mini2.jpg", "mini3.jpg"],
                edad: "6 meses",
                tamano: "Pequeña",
                raza: "Poodle",
                color: "Blanco",
                desc: "Es una cachorrita muy dulce, ideal para vivir en apartamento.",
                requisitos: `
                    <p>Disponibilidad horaria para atender las necesidades de un cachorro (enseñanza de esfínteres).</p>
                    <p>Compromiso de esterilización obligatorio a los 8 meses.</p>
                    <p>Hogar tranquilo sin niños muy pequeños.</p>
                    <p>Cuidados específicos del pelaje (peluquería regular).</p>
                    <p>Asumir plan de vacunación inicial completo.</p>
                `
            },
            "4": {
                nombre: "Max",
                imgPrincipal: "Max.png",
                minis: ["mini1.jpg", "mini2.jpg", "mini3.jpg"],
                edad: "1 año",
                tamano: "Mediano",
                raza: "Beagle",
                color: "Tricolor",
                desc: "Max es muy curioso y le encanta seguir rastros en el parque.",
                requisitos: `
                    <p>Paciencia para adiestramiento, los Beagles son perros testarudos pero inteligentes.</p>
                    <p>Paseos obligatorios con correa (tienden a escaparse siguiendo olores).</p>
                    <p>Alimentación controlada (tienden a la obesidad).</p>
                    <p>Hogar donde no pase muchas horas solo.</p>
                    <p>DNI, comprobante de domicilio.</p>
                `
            },
            "5": {
                nombre: "Rocky",
                imgPrincipal: "Rocky.png",
                minis: ["mini1.jpg", "mini2.jpg", "mini3.jpg"],
                edad: "5 años",
                tamano: "Grande",
                raza: "Pastor Alemán",
                color: "Tricolor",
                desc: "Un perro leal y protector, perfecto como compañero.",
                requisitos: `
                    <p>Experiencia previa en manejo de razas grandes y de trabajo.</p>
                    <p>Espacio amplio para vivir.</p>
                    <p>Tiempo para realizar ejercicio de media intensidad.</p>
                    <p>Liderazgo firme y positivo.</p>
                    <p>Evaluación del entorno familiar antes de la adopción.</p>
                `

            },
            "6": {
                nombre: "Bella",
                imgPrincipal: "Bella.png",
                minis: ["mini6-1.jpg", "mini6-2.jpg", "mini6-3.jpg"],
                edad: "2 años",
                tamano: "Grande",
                raza: "Pastor Australiano",
                color: "Tricolor",
                desc: "La perra más dulce y sociable, ideal para familias con niños.",
                requisitos: `
                    <p>Hogar con niños dispuestos a interactuar con respeto.</p>
                    <p>Mucho tiempo para compañía, sufren si pasan tiempo solos.</p>
                    <p>Disponibilidad para cepillado diario de su pelaje.</p>
                    <p>Hogar con espacio para que se mueva libremente.</p>
                    <p>Cubrir los costes de adopción asociados al rescate.</p>
                `
            }
        };

        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || "1"; 
            const perro = catalogoPerros[id];

            if (perro) {
                // RUTA ACTUALIZADA
                const rutaBase = "../assets/recursos_pagina_principal/adopcion_imagenes/";

                // 1. Actualizar Imagen Principal
                document.getElementById('petImage').src = rutaBase + perro.imgPrincipal;

                // 2. Actualizar las 3 Miniaturas
                const elementosMini = document.querySelectorAll('.mini-foto');
                perro.minis.forEach((archivo, index) => {
                    if (elementosMini[index]) {
                        elementosMini[index].src = rutaBase + archivo;
                    }
                });

                // 3. Actualizar Datos de Texto
                document.getElementById('petName').innerText = perro.nombre;
                document.getElementById('reqName').innerText = perro.nombre;
                document.getElementById('petAge').innerText = perro.edad;
                document.getElementById('petSize').innerText = perro.tamano;
                document.getElementById('petBreed').innerText = perro.raza;
                document.getElementById('petColor').innerText = perro.color;
                document.getElementById('petDescription').innerText = perro.desc;
                document.getElementById('reqContent').innerHTML = perro.requisitos;
            }
        };

        function procesarSolicitud() {
            alert("Solicitud en proceso");
        }

        // Lógica Menú Lateral
        const btnMenu = document.getElementById('btn-menu');
        const menuLatente = document.getElementById('menu-latente');
        btnMenu.addEventListener('click', () => menuLatente.classList.toggle('show'));
    </script>
</body>
</html>
