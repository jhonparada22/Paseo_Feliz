<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paseo Feliz - Chat</title>

    <link rel="stylesheet" href="../principal_css/global.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body>

    <div class="app-container">

        <!-- ── SIDEBAR ────────────────────────────────────────── -->
        <nav class="sidebar">
            <div class="menu-hamburguesa-container">
                <div class="profile-circle" id="btn-menu">
                    <i class="fas fa-bars"></i>
                </div>
                <nav class="menu-desplegable" id="menu-latente">
                    <ul>
                        <li><i class="fas fa-camera"></i><span>Conócenos</span></li>
                        <li><i class="fas fa-book-open"></i><span>Dirección oficial</span></li>
                        <li><i class="fas fa-sliders-h"></i><span>Centro de ayuda</span></li>
                        <li><i class="fas fa-gear"></i><span>Configuración</span></li>
                        <li><i class="fas fa-user-minus"></i><span>Cerrar sesión</span></li>
                    </ul>
                </nav>
            </div>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-paw"></i><span>Servicios</span></a></li>
                <li class="active"><a href="#"><i class="far fa-comment-alt"></i><span>Chat</span></a></li>
                <li><a href="mapa.html"><i class="fas fa-map-marker-alt"></i><span>Mapa</span></a></li>
                <li><a href="adopcion.html"><i class="fas fa-bone"></i><span>Adopción</span></a></li>
                <li><a href="usuario.html"><i class="fas fa-user"></i><span>Usuario</span></a></li>
            </ul>
        </nav>

        <!-- ── CHAT PRINCIPAL ─────────────────────────────────── -->
        <div class="chat-main">

            <!-- Lista de conversaciones -->
            <div class="conversations-panel" id="conv-panel">
                <div class="conversations-header">
                    <h2>Conversación</h2>
                </div>

                <div class="search-conv">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar conversación..." />
                </div>

                <div class="conv-list" id="conv-list">
                    <!-- Las conversaciones se renderizan con JS -->
                </div>
            </div>

            <!-- Ventana de chat activa -->
            <div class="chat-window" id="chat-window">

                <!-- Placeholder cuando no hay conversación seleccionada -->
                <div class="empty-chat" id="empty-state">
                    <i class="far fa-comment-dots"></i>
                    <p>Selecciona una conversación para comenzar</p>
                </div>

                <!-- Header del chat (oculto hasta seleccionar) -->
                <div class="chat-header" id="chat-header" style="display:none;">
                    <button class="chat-header-back" id="btn-back" style="display:none;">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="chat-header-avatar" id="header-avatar"></div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="header-name"></div>
                        <div class="chat-header-status" id="header-status">En línea</div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="action-btn" title="Llamada"><i class="fas fa-phone"></i></button>
                        <button class="action-btn" title="Más opciones"><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                </div>

                <!-- Mensajes -->
                <div class="messages-area" id="messages-area" style="display:none;"></div>

                <!-- Input -->
                <div class="input-area" id="input-area" style="display:none;">
                    <button class="input-icon-btn" title="Emoji" id="btn-emoji">
                        <i class="far fa-smile"></i>
                    </button>
                    <button class="input-icon-btn" title="Adjuntar archivo" id="btn-attach">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <div class="input-wrapper">
                        <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje..."></textarea>
                    </div>
                    <button class="send-btn" id="btn-send" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ── DATOS DE CONVERSACIONES (simulados) ─────────────────────────────────────
        const conversaciones = [
            {
                id: 1,
                nombre: "Yilber administrador",
                rol: "Administrador",
                iniciales: "YA",
                online: true,
                tiempo: "10 min",
                ultimo: "Claro, está bien...",
                badge: 2,
                mensajes: [
                    { de: "ellos", texto: "Hola, ¿en qué te puedo ayudar hoy?", hora: "09:41", leido: true },
                    { de: "yo", texto: "Hola buenos días, quiero cambiar el horario de los paseos", hora: "09:43", leido: true, imagen: "https://images.dog.ceo/breeds/spaniel-cocker/n02102318_10148.jpg", imgCaption: "Mi perro 🐶" },
                    { de: "ellos", texto: "Claro está bien dime el horario que desea", hora: "09:44", leido: true },
                ]
            },
            {
                id: 2,
                nombre: "Paseador Enrique",
                rol: "Paseador",
                iniciales: "PE",
                online: true,
                tiempo: "10 min",
                ultimo: "El paseo terminó exitosamente ✅",
                badge: 0,
                mensajes: [
                    { de: "ellos", texto: "¡Buenos días! Salí con Max a las 7am", hora: "07:02", leido: true },
                    { de: "ellos", texto: "El paseo terminó exitosamente ✅", hora: "07:58", leido: true },
                    { de: "yo", texto: "¡Perfecto! Muchas gracias Enrique 🙏", hora: "08:10", leido: true },
                ]
            },
            {
                id: 3,
                nombre: "Paseador Juan",
                rol: "Paseador",
                iniciales: "PJ",
                online: false,
                tiempo: "3 días",
                ultimo: "Confirmo reserva para el lunes",
                badge: 0,
                mensajes: [
                    { de: "yo", texto: "Hola Juan, ¿puedes el lunes?", hora: "Lun 10:00", leido: true },
                    { de: "ellos", texto: "Confirmo reserva para el lunes", hora: "Lun 10:15", leido: true },
                ]
            }
        ];

        let convActiva = null;
        let escribiendo = false;

        // ── RENDER: lista de conversaciones ──────────────────────────────────────────
        function renderConvList(filtro = '') {
            const lista = document.getElementById('conv-list');
            lista.innerHTML = '';

            const filtradas = conversaciones.filter(c =>
                c.nombre.toLowerCase().includes(filtro.toLowerCase())
            );

            filtradas.forEach(conv => {
                const item = document.createElement('div');
                item.className = 'conv-item' + (convActiva && convActiva.id === conv.id ? ' active' : '');
                item.dataset.id = conv.id;

                item.innerHTML = `
      <div class="conv-avatar">
        <span>${conv.iniciales}</span>
        ${conv.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name">${conv.nombre}</div>
        <div class="conv-last">${conv.ultimo}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${conv.tiempo}</span>
        ${conv.badge > 0 ? `<div class="conv-badge">${conv.badge}</div>` : ''}
      </div>
    `;

                item.addEventListener('click', () => abrirConversacion(conv.id));
                lista.appendChild(item);
            });
        }

        // ── RENDER: mensajes de la conversación activa ────────────────────────────────
        function renderMensajes(conv) {
            const area = document.getElementById('messages-area');
            area.innerHTML = '';

            // Separador de fecha
            const divider = document.createElement('div');
            divider.className = 'date-divider';
            divider.innerHTML = '<span>Hoy</span>';
            area.appendChild(divider);

            conv.mensajes.forEach(msg => {
                const row = document.createElement('div');
                row.className = `msg-row ${msg.de === 'yo' ? 'sent' : 'received'}`;

                let contenidoMsg = '';

                if (msg.imagen) {
                    contenidoMsg += `<img src="${msg.imagen}" class="msg-image" alt="imagen adjunta" />`;
                    if (msg.imgCaption) contenidoMsg += `<div class="msg-image-caption">${msg.imgCaption}</div>`;
                }
                contenidoMsg += msg.texto;

                const checkIcon = msg.de === 'yo'
                    ? `<i class="fas fa-check-double" style="font-size:0.65rem;"></i>`
                    : '';

                if (msg.de === 'ellos') {
                    row.innerHTML = `
        <div class="msg-avatar-sm">${conv.iniciales}</div>
        <div>
          <div class="msg-bubble">${contenidoMsg}</div>
          <div class="msg-time">${msg.hora}</div>
        </div>
      `;
                } else {
                    row.innerHTML = `
        <div>
          <div class="msg-bubble">${contenidoMsg}</div>
          <div class="msg-time">${checkIcon} ${msg.hora}</div>
        </div>
      `;
                }

                area.appendChild(row);
            });

            // Scroll al fondo
            area.scrollTop = area.scrollHeight;
        }

        // ── ABRIR CONVERSACIÓN ────────────────────────────────────────────────────────
        function abrirConversacion(id) {
            convActiva = conversaciones.find(c => c.id === id);
            if (!convActiva) return;

            // Quitar badge
            convActiva.badge = 0;

            // Actualizar header
            const header = document.getElementById('chat-header');
            const headerAvt = document.getElementById('header-avatar');
            const headerNom = document.getElementById('header-name');
            const headerSts = document.getElementById('header-status');
            const emptyState = document.getElementById('empty-state');
            const msgArea = document.getElementById('messages-area');
            const inputArea = document.getElementById('input-area');

            headerAvt.textContent = convActiva.iniciales;
            headerNom.textContent = convActiva.nombre;
            headerSts.textContent = convActiva.online ? 'En línea' : 'Desconectado';
            headerSts.style.color = convActiva.online ? '#25D366' : '#aaa';

            emptyState.style.display = 'none';
            header.style.display = 'flex';
            msgArea.style.display = 'flex';
            inputArea.style.display = 'flex';

            renderMensajes(convActiva);
            renderConvList(document.getElementById('search-input').value);

            // Responsive: en móvil ocultar panel
            if (window.innerWidth <= 680) {
                document.getElementById('conv-panel').classList.add('hidden');
                document.getElementById('btn-back').style.display = 'flex';
            }
        }

        // ── ENVIAR MENSAJE ────────────────────────────────────────────────────────────
        function enviarMensaje() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (!texto || !convActiva) return;

            const ahora = new Date();
            const hora = ahora.getHours().toString().padStart(2, '0') + ':' +
                ahora.getMinutes().toString().padStart(2, '0');

            convActiva.mensajes.push({ de: 'yo', texto, hora, leido: false });
            convActiva.ultimo = texto;
            convActiva.tiempo = 'Ahora';

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('btn-send').disabled = true;

            renderMensajes(convActiva);
            renderConvList();

            // Simular respuesta del otro usuario
            simularRespuesta();
        }

        function simularRespuesta() {
            const area = document.getElementById('messages-area');

            // Mostrar "escribiendo..."
            const typingRow = document.createElement('div');
            typingRow.className = 'msg-row received';
            typingRow.id = 'typing-row';
            typingRow.innerHTML = `
    <div class="msg-avatar-sm">${convActiva.iniciales}</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
            area.appendChild(typingRow);
            area.scrollTop = area.scrollHeight;

            const respuestas = [
                "Entendido, con gusto te ayudo con eso 😊",
                "Claro, déjame revisar y te confirmo.",
                "Perfecto, tomaré nota de eso.",
                "¡Listo! Queda agendado para la fecha indicada.",
                "¿Hay algo más en lo que pueda ayudarte?"
            ];

            setTimeout(() => {
                const rowEl = document.getElementById('typing-row');
                if (rowEl) rowEl.remove();

                const respuesta = respuestas[Math.floor(Math.random() * respuestas.length)];
                const ahora = new Date();
                const hora = ahora.getHours().toString().padStart(2, '0') + ':' +
                    ahora.getMinutes().toString().padStart(2, '0');

                convActiva.mensajes.push({ de: 'ellos', texto: respuesta, hora, leido: true });
                convActiva.ultimo = respuesta;
                renderMensajes(convActiva);
                renderConvList();
            }, 1800);
        }

        // ── EVENTOS ───────────────────────────────────────────────────────────────────

        // Textarea: auto-resize y activar botón enviar
        document.getElementById('msg-input').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            document.getElementById('btn-send').disabled = this.value.trim() === '';
        });

        // Enter para enviar (Shift+Enter = nueva línea)
        document.getElementById('msg-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });

        document.getElementById('btn-send').addEventListener('click', enviarMensaje);

        // Búsqueda de conversaciones
        document.getElementById('search-input').addEventListener('input', function () {
            renderConvList(this.value);
        });

        // Botón volver en móvil
        document.getElementById('btn-back').addEventListener('click', () => {
            document.getElementById('conv-panel').classList.remove('hidden');
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('chat-header').style.display = 'none';
            document.getElementById('messages-area').style.display = 'none';
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('empty-state').style.display = 'flex';
            convActiva = null;
        });

        // Menú hamburguesa
        document.getElementById('btn-menu').addEventListener('click', () => {
            document.getElementById('menu-latente').classList.toggle('show');
        });
        window.addEventListener('click', e => {
            const btn = document.getElementById('btn-menu');
            const menu = document.getElementById('menu-latente');
            if (!btn.contains(e.target) && !menu.contains(e.target))
                menu.classList.remove('show');
        });

        // ── INIT ──────────────────────────────────────────────────────────────────────
        renderConvList();

        // Abrir la primera conversación por defecto en desktop
        if (window.innerWidth > 680) {
            abrirConversacion(1);
        }
    </script>
</body>

</html>
